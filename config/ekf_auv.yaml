ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.2
    two_d_mode: false
    publish_tf: false
    map_frame: map
    odom_frame: world_enu
    base_link_frame: cirtesub/base_link
    world_frame: world_enu

    pose0: /cirtesub/sensors/pressure/pose
    pose0_config: [false, false, true,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    pose0_differential: false
    pose0_relative: false
    pose0_queue_size: 10

    pose1: /cirtesub/sensors/aruco/pose_enu
    pose1_config: [true, true, false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    pose1_differential: false
    pose1_relative: false
    pose1_queue_size: 10
    pose1_rejection_threshold: 2.0

    odom0: /cirtesub/sensors/gps/odometry
    odom0_config: [true, true, false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    twist0: /cirtesub/sensors/dvl/twist
    twist0_config: [false, false, false,
                    false, false, false,
                    true, true, false,
                    false, false, false,
                    false, false, false]
    twist0_differential: false
    twist0_relative: false
    twist0_queue_size: 10

    imu0: /cirtesub/sensors/imu_enu
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 20
    imu0_remove_gravitational_acceleration: false

navsat_transform_node:
  ros__parameters:
    frequency: 10.0
    delay: 0.0
    magnetic_declination_radians: 0.0
    yaw_offset: 0.0
    zero_altitude: true
    publish_filtered_gps: true
    use_odometry_yaw: true
    wait_for_datum: false
    broadcast_utm_transform: false
    broadcast_utm_transform_as_parent_frame: false
